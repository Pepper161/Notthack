name: nourishchain
description: NourishChain - Wallet-free QR meal voucher trust layer for university hardship support.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  lucide_icons: ^0.257.0
  mobile_scanner: ^5.2.3
  http: ^1.2.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/nourish_chain_logo.png
